## ============================================================
## AGENTIC TRADING BOT - MASTER CONFIGURATION
## Indian Markets | Zerodha + Dhan | Multi-Strategy AI
## ============================================================

app:
  name: "AgentTrader India"
  version: "1.0.0"
  environment: "production"  # paper | production
  log_level: "INFO"

## ─── MARKET SETTINGS ───────────────────────────────────────
market:
  exchange: ["NSE", "BSE", "NFO", "MCX"]
  timezone: "Asia/Kolkata"
  sessions:
    pre_open: "09:00"
    open: "09:15"
    close: "15:30"
    post_close: "15:45"
  holidays_file: "config/market_holidays.json"

## ─── BROKER CREDENTIALS ────────────────────────────────────
brokers:
  zerodha:
    enabled: true
    api_key: "${ZERODHA_API_KEY}"
    api_secret: "${ZERODHA_API_SECRET}"
    user_id: "${ZERODHA_USER_ID}"
    password: "${ZERODHA_PASSWORD}"
    totp_secret: "${ZERODHA_TOTP_SECRET}"
    redirect_url: "http://localhost:5000/auth/zerodha/callback"
    sandbox: false

  dhan:
    enabled: true
    client_id: "${DHAN_CLIENT_ID}"
    access_token: "${DHAN_ACCESS_TOKEN}"
    sandbox: false

  primary: "dhan"
  replication:
    enabled: true
    leader: "dhan"
    follower: "zerodha"
    reconcile_interval_seconds: 120

## ─── AI AGENT SETTINGS ─────────────────────────────────────
agent:
  # ── API Keys ───────────────────────────────────────────────
  api_key_env: "GEMINI_API_KEY"
  groq_api_key_env: "GROQ_API_KEY"
  openrouter_api_key_env: "OPENROUTER_API_KEY"
  xiaomi_mimo_api_key_env: "XIAOMI_MIMO_API_KEY"   # optional — direct MiMo API

  # ── Primary Model ───────────────────────────────────────────
  # Gemini 2.5 Flash with thinking disabled is the best choice
  # for intraday trading: fast JSON, large context, cheapest capable model
  model: "gemini/gemini-2.5-flash"

  # ── Thinking Mode ───────────────────────────────────────────
  # 0  = DISABLED (recommended for live trading — saves 2-8s per call)
  # >0 = enables Gemini chain-of-thought (use only for strategy review)
  # NEVER set above 0 during market hours
  thinking_budget: 0

  # ── Model Tiers ─────────────────────────────────────────────
  # IMPORTANT: Only models >= 32B parameters are listed here.
  # Smaller models (7B, 8B) hallucinate price levels and
  # generate invalid JSON for complex watchlist prompts.
  # Removed models (reason):
  #   groq/llama-3.1-8b-instant       — 8B hallucinates prices
  #   groq/mixtral-8x7b-32768         — Groq deprecated endpoint
  #   openrouter/mistralai/mistral-7b  — 7B too small for prompt
  #   openrouter/mistralai/mistral-nemo — poor financial reasoning
  #   openrouter/qwen/qwen-2.5-7b      — 7B invalid SL values
  #   gemini/gemini-1.5-flash          — replaced by 2.0-flash
  model_tiers:
    ultra_fast:
      # Fastest option when primary is rate-limited
      - "gemini/gemini-2.5-flash-lite"
    fast:
      # Proven reliable, works on cloud IPs, strong JSON adherence
      - "gemini/gemini-2.0-flash"
      # DeepSeek V3 — excellent financial domain, very cheap
      - "openrouter/deepseek/deepseek-chat"
    balanced:
      # 72B — strong reasoning, handles complex multi-symbol prompts
      - "openrouter/qwen/qwen-2.5-72b-instruct"
    quality:
      # Best non-Google option for financial reasoning
      - "openrouter/meta-llama/llama-3.3-70b-instruct"

  # ── Fallback List ───────────────────────────────────────────
  # Explicit ordered fallback chain — fires when primary fails
  fallback_models:
    - "gemini/gemini-2.5-flash-lite"
    - "gemini/gemini-2.0-flash"
    - "openrouter/deepseek/deepseek-chat"
    - "openrouter/qwen/qwen-2.5-72b-instruct"

  # ── Generation Parameters ───────────────────────────────────
  # max_tokens: reduced 4096→2048
  #   Trading JSON responses never exceed ~1200 tokens.
  #   Smaller limit cuts output generation latency by ~40%.
  max_tokens: 2048

  # temperature: reduced 0.1→0.05
  #   Lower = more deterministic confidence scores.
  #   Prevents random variation in RSI/MACD interpretation.
  temperature: 0.05

  # ── Decision Timing ─────────────────────────────────────────
  # How often AI evaluates the market during trading hours
  decision_interval_seconds: 60
  # Full strategy review (uses performance data, runs hourly)
  strategy_review_interval: 3600
  max_concurrent_strategies: 5

  # ── Signal Quality Gate ─────────────────────────────────────
  # Minimum confidence required to pass a signal to risk manager.
  # 0.65 = require 2-3 indicators aligned (see calibration anchors
  # in AGENT_SYSTEM_PROMPT for the full calibration table).
  confidence_threshold: 0.65

## ─── ENGINE SELECTION ───────────────────────────────────────
engine:
  selection_mode: "watchlist"        # watchlist | auto_pick
  watchlist_symbols:
    - "RELIANCE"
    - "TCS"
    - "INFY"
    - "HDFCBANK"
    - "ICICIBANK"
    - "KOTAKBANK"
    - "HINDUNILVR"
    - "WIPRO"
    - "SBIN"
    - "AXISBANK"
    - "ADANIENT"
    - "BAJFINANCE"
    - "TITAN"
    - "MARUTI"
    - "NESTLEIND"
    - "TATAMOTORS"
    - "TATAPOWER"
    - "ZOMATO"
    - "PAYTM"
    - "LT"
  min_stock_price: 50
  max_stock_price: 5000
  max_auto_pick_symbols: 10
  min_avg_daily_volume: 100000
  min_avg_daily_turnover: 5000000
  session_profiles:
    opening:
      selection_multiplier: 0.7
      risk_cap_multiplier: 0.7
    mid_session:
      selection_multiplier: 1.0
      risk_cap_multiplier: 1.0
    closing:
      selection_multiplier: 0.6
      risk_cap_multiplier: 0.8

## ─── RISK MANAGEMENT ────────────────────────────────────────
risk:
  max_capital_per_trade_pct: 5.0      # Max 5% of capital per trade
  max_open_positions: 10
  max_daily_loss_pct: 2.0             # Kill switch: stop if day loss > 2%
  max_drawdown_pct: 8.0               # Kill switch: stop if drawdown > 8%
  stop_loss_pct: 1.5                  # Default SL per trade
  target_pct: 3.0                     # Default target per trade
  trailing_stop: true
  trailing_stop_pct: 0.8
  position_sizing_method: "kelly"     # fixed | kelly | volatility_adjusted
  max_order_value_absolute: null
  min_cash_buffer: 0
  tiny_account_mode: false

## ─── STRATEGIES ─────────────────────────────────────────────
strategies:
  momentum:
    enabled: true
    lookback_period: 20
    rsi_period: 14
    rsi_overbought: 70
    rsi_oversold: 30
    volume_multiplier: 1.5

  mean_reversion:
    enabled: true
    bb_period: 20
    bb_std: 2.0
    rsi_period: 14

  options_selling:
    enabled: true
    instruments: ["NIFTY", "BANKNIFTY", "FINNIFTY"]
    strategy_types: ["iron_condor", "short_strangle", "bull_put_spread"]
    delta_target: 0.2
    dte_min: 3
    dte_max: 21
    iv_rank_threshold: 50

  breakout:
    enabled: true
    atr_period: 14
    breakout_multiplier: 1.5

## ─── DATA SETTINGS ──────────────────────────────────────────
data:
  redis:
    host: "${REDIS_HOST:-localhost}"
    port: 6379
    db: 0
    tick_ttl: 86400

  postgres:
    host: "${POSTGRES_HOST:-localhost}"
    port: 5432
    database: "trading_bot"
    user: "${POSTGRES_USER:-trader}"
    password: "${POSTGRES_PASSWORD}"
    pool_size: 10

  websocket:
    reconnect_delay: 5
    max_reconnect_attempts: 10
    heartbeat_interval: 30

## ─── NOTIFICATIONS ──────────────────────────────────────────
notifications:
  telegram:
    enabled: true
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
    alerts:
      - trade_entry
      - trade_exit
      - stop_loss_hit
      - daily_pnl
      - system_error
      - kill_switch_triggered

  email:
    enabled: false
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    from_email: "${EMAIL_FROM}"
    to_email: "${EMAIL_TO}"

## ─── BACKTESTING ────────────────────────────────────────────
backtest:
  data_source: "dhan"
  default_capital: 1000000
  slippage_pct: 0.05
  brokerage_per_order: 20
  stt_equity_delivery: 0.001
  stt_equity_intraday: 0.00025
  stt_options_sell: 0.0005

## ─── HISTORICAL DATA BACKFILL ─────────────────────────────
historical:
  max_attempts: 5
  base_delay_seconds: 1.0
  allow_fallback: true
